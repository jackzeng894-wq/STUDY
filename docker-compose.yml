version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: learning_agent_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: learning_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: learning_agent_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/learning_agent
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/learning_agent
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
